/* RENDER PRODUCTS */

function renderProducts(items = products){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

items.forEach(product=>{

container.innerHTML += `

<div class="product">

<img src="${product.image}">

<div class="product-body">

<h3>${product.name}</h3>

<p>${product.description}</p>

<div class="price">

<strong>${product.price} ج</strong>

<button
class="buy-btn"
onclick="addToCart(${product.id})">

أضف للسلة

</button>

</div>

</div>

</div>

`;

});

}

/* SEARCH */

function searchProducts(){

const value =
document
.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
products.filter(product=>

product.name
.toLowerCase()
.includes(value)

);

renderProducts(filtered);

}

/* CART SYSTEM */

let cart = [];

/* تنظيف السلة القديمة */

localStorage.removeItem("cart");

function toggleCart(){

document
.getElementById("cart")
.classList.toggle("active");

}

/* ADD TO CART */

function addToCart(id){

const product =
products.find(p => p.id === id);

const existing =
cart.find(item => item.id === id);

if(existing){

existing.quantity += 1;

}else{

cart.push({

...product,
quantity:1

});

}

saveCart();

renderCart();

alert("🔥 دي شكلها هتولع بقا وهنشتري الـ BMW 🚘✨");

}

/* SAVE CART */

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

}

/* RENDER CART */

function renderCart(){

const container =
document.getElementById("cartItems");

const total =
document.getElementById("total");

const count =
document.getElementById("cartCount");

container.innerHTML = "";

let totalPrice = 0;
let totalCount = 0;

cart.forEach(item=>{

const itemTotal =
item.price * item.quantity;

totalPrice += itemTotal;

totalCount += item.quantity;

container.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div>

<h4>${item.name}</h4>

<p>

${item.quantity} × ${item.price} ج

</p>

<strong>

${itemTotal} ج

</strong>

</div>

</div>

`;

});

total.innerHTML = totalPrice;

count.innerHTML = totalCount;

}

/* CHECKOUT */

function checkout(){

if(cart.length === 0){

alert("السلة فارغة 😅");

return;

}

let message =
`🌸 طلب جديد من Rosavelleee 🌸

`;

cart.forEach(item=>{

message += `
🛍 المنتج:
${item.name}

🔢 الكمية:
${item.quantity}

💵 السعر:
${item.price} ج

ــــــــــــــــــ
`;

});

const finalTotal =
cart.reduce(
(sum,item)=>
sum + (item.price * item.quantity),
0
);

message += `

💰 الإجمالي النهائي:
${finalTotal} ج

✨ شكراً لطلبك من Rosavelleee
`;

const encoded =
encodeURIComponent(message);

window.open(

`https://wa.me/2001044829997?text=${encoded}`,

"_blank"

);

}
