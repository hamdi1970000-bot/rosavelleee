<script>

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function toggleCart(){

document.getElementById('cart')
.classList.toggle('active');

}

function addToCart(name,price,image){

cart.push({
name,
price,
image
});

saveCart();
renderCart();

alert('تم إضافة المنتج للسلة ✅');

}

function removeItem(index){

cart.splice(index,1);

saveCart();
renderCart();

}

function saveCart(){

localStorage.setItem('cart',JSON.stringify(cart));

}

function renderCart(){

const container =
document.getElementById('cartItems');

const total =
document.getElementById('total');

const count =
document.getElementById('cartCount');

container.innerHTML='';

let totalPrice = 0;

cart.forEach((item,index)=>{

totalPrice += item.price;

container.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div style="flex:1">

<h4>${item.name}</h4>

<p>${item.price} ج</p>

<button
onclick="removeItem(${index})"
style="
margin-top:8px;
border:none;
background:#d88995;
color:white;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
">
حذف
</button>

</div>

</div>

`;

});

total.innerHTML = totalPrice;

count.innerHTML = cart.length;

}

function checkout(){

if(cart.length === 0){

alert('السلة فارغة');

return;

}

let message = 'مرحباً، أريد طلب المنتجات التالية:%0A%0A';

let total = 0;

cart.forEach(item=>{

message += `• ${item.name} - ${item.price} ج%0A`;

total += item.price;

});

message += `%0Aالإجمالي: ${total} ج`;

window.open(
`https://wa.me/201000000000?text=${message}`,
'_blank'
);

}

renderCart();

</script>
